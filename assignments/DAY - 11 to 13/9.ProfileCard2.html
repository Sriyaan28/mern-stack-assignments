            background-color: rgb(247, 252, 144);

        {
            margin-top: 50px;
            border-radius: 50%;
        }
        h1,p
        {
            margin: 50px 0px;
        }
        .box1
        {
            height: 50px;
            width: 50px;
            background-color: cornflowerblue;
            position: relative;
            top: -20px;
            right: -270px;
        }
        .box2
        {
            background-color: burlywood;
             height: 50px;
            width: 50px;
            position: relative;
            left: 125px;
        }
    </style>
</head>

</html>
