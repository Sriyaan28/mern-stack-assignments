<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form
        {
            margin-top: 100px;
            padding: 100px;
            border-radius: 30px;
            box-shadow: 1px 1px 30px rgb(1, 19, 59);
            background-color: rgb(125, 164, 236);

        }
        div
        {
            width: 300px;
            margin: auto;
        }
        input[type="text"],input[type="password"],select,textarea
        {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin: 5px 0px;
        }
        button
        {
            padding: 5px 10px;
            border-radius: 10px;
            border: none;
        }
    </style>
</head>
<body>
    <form action="">
        <div>
            <label for="username">Username:</label>
        <input type="text" id="username" name="username">
        </div>
        <div>
                    <label for="email">Password:</label>
        <input type="password" id="password" name="password">
        </div>
        <div>
            <button type="submit" value="submit">Submit</button>
        </div>
    </form>
</body>
</html>
