<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .emp-card
        {
            width: 300px;
            height: 500px;
            border-radius: 20px;
            margin: auto;
            margin-top: 100px;
            box-shadow: 1px 1px 30px gray;
            text-align: center;
        }
        img
        {
            width: 40%;
            border-radius: 50%;
            box-shadow: -1px 1px 10px gray;
            margin: 30px 0px;
        }
        p{
            margin: 20px 0px;
        }
        button{
            margin: 10px 20px;
            padding: 10px;
            border-radius: 10px;
            border: none;
        }
        button:hover{
            color: gray;
        }
    </style>
</head>
<body>
    <div class="emp-card">
        <img src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png" alt="profile pic">
        <h2 class="name">Lorem, ipsum.</h2>
        <p class="info">Lorem ipsum dolor sit amet consectetur adipisicing elit. Quam perspiciatis, hic libero cumque nesciunt ex eligendi repudiandae quod id cum!</p>
        <button class="btn1">Show profile</button>
        <button class="btn2">Contact</button>
    </div>
</body>
</html>
