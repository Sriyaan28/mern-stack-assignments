<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        img
        {
            width: 100%;
        }
        /* media queries */
        @media screen and (min-width: 600px) 
        {
            body
            {
                background-color: rgb(255, 255, 255);
            }    
            
        }
        @media screen and (max-width: 599px)
        {
            body
            {
                background-color: blue;
            }   
            img
            {
                display: none;
            } 
        }
    </style>
</head>
<body>
    <img src="https://www.pixelstalk.net/wp-content/uploads/images2/Scenery-Wallpaper-HD-Widescreen.jpg" alt="">
</body>
</html>
